<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aviso de Pago - InmoDoc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

<div class="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl border-4 border-orange-500 overflow-hidden">

    <div class="bg-orange-500 p-6 text-center">
        <h1 class="text-white font-black uppercase tracking-tighter text-xl">Liliana Cirigliano</h1>
        <p class="text-orange-100 text-[10px] font-bold uppercase tracking-widest">Inmobiliaria • Aviso de Pago</p>
    </div>

    <div class="p-8 space-y-6">
        <div class="text-center">
            <p class="text-slate-400 text-xs font-bold uppercase mb-1">Hola,</p>
            <h2 class="text-xl font-extrabold text-slate-800" th:text="${contrato.cliente.nombre}"></h2>
            <p class="text-slate-500 text-xs mt-1" th:text="${contrato.propiedad}"></p>
        </div>

        <div class="bg-slate-50 rounded-3xl p-6 space-y-3">
            <div class="flex justify-between text-sm">
                <span class="text-slate-500">Alquiler</span>
                <span class="font-bold text-slate-700" th:text="'$ ' + ${#numbers.formatDecimal(contrato.montoMensual, 1, 'POINT', 2, 'COMMA')}"></span>
            </div>
            <div th:if="${luz > 0}" class="flex justify-between text-sm">
                <span class="text-slate-500">Luz</span>
                <span class="font-bold text-slate-700" th:text="'$ ' + ${#numbers.formatDecimal(luz, 1, 'POINT', 2, 'COMMA')}"></span>
            </div>
            <div th:if="${gas > 0}" class="flex justify-between text-sm">
                <span class="text-slate-500">Gas</span>
                <span class="font-bold text-slate-700" th:text="'$ ' + ${#numbers.formatDecimal(gas, 1, 'POINT', 2, 'COMMA')}"></span>
            </div>
            <div class="border-t border-slate-200 pt-3 flex justify-between items-center">
                <span class="text-orange-600 font-black text-sm uppercase">Total a pagar</span>
                <span class="text-2xl font-black text-slate-900" th:text="'$ ' + ${#numbers.formatDecimal(total, 1, 'POINT', 2, 'COMMA')}"></span>
            </div>
        </div>

        <div th:if="${nota != null && !nota.isEmpty()}" class="text-center bg-orange-50 p-3 rounded-xl border border-orange-100">
            <p class="text-[11px] text-orange-700 font-medium italic" th:text="${nota}"></p>
        </div>

        <div class="text-center pt-2">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Muchas Gracias</p>
        </div>
    </div>
</div>

</body>
</html>
